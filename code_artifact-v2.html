<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فرم ثبت نام و ورود به سایت - نسخه مودال</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Vazirmatn Font CDN (Standard web-safe alternative to Yekan Bakh) -->
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Yekan Bakh VF', 'Vazirmatn', sans-serif;
            background: #f3ede2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #e7a439;
            border-radius: 10px;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Trigger Button (برای دمو و تست باز شدن مودال) -->
    <button 
        onclick="openAuthModal()" 
        class="px-6 py-3 bg-[#E7A439] hover:bg-[#cf902f] text-[#FDF6EB] font-bold text-base rounded-[8px] shadow-lg transition-all duration-300 flex items-center space-x-2 space-x-reverse z-10"
    >
        <i data-lucide="user-check" class="w-5 h-5"></i>
        <span>ورود / عضویت در سایت</span>
    </button>

    <!-- MODAL BACKDROP OVERLAY -->
    <div 
        id="authModal" 
        class="fixed inset-0 z-50 flex items-center justify-center p-4 md:p-8 bg-black/60 backdrop-blur-sm opacity-0 pointer-events-none transition-all duration-300 overflow-y-auto"
    >
        
        <!-- Main Container / Popup Wrapper -->
        <div class="relative w-full max-w-[1128px] min-h-[736px] md:h-[736px] bg-[#FFFDFA] rounded-[24px] shadow-[0_25px_60px_rgba(0,0,0,0.2)] overflow-hidden flex flex-col md:flex-row transition-all duration-500 ease-in-out transform scale-95 opacity-0">
            
            <!-- CLOSE BUTTON (Top Right - Primary Color) -->
            <button 
                onclick="closeAuthModal()" 
                class="absolute top-4 right-4 z-50 p-2 text-[#E7A439] hover:bg-[#E7A439]/10 rounded-full transition-all duration-200"
                aria-label="بستن مودال"
            >
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
            
            <!-- RIGHT SIDE: Forms Container (Vertically & Horizontally Centered) -->
            <div class="w-full md:w-1/2 flex flex-col justify-center items-center p-6 md:p-12 relative min-h-[486px] md:min-h-0 z-10">
                
                <!-- FORM 1: REGISTER (ثبت نام در سایت) -->
                <div id="signupForm" class="w-full max-w-[479px] transition-all duration-500 transform translate-x-0 opacity-100 flex flex-col justify-center">
                    
                    <!-- STEP 1: Basic Information -->
                    <div id="signupStep1" class="transition-all duration-300 transform translate-x-0 opacity-100 flex flex-col justify-center space-y-5">
                        <div>
                            <!-- Centered Title, Primary Color, No Border -->
                            <h1 class="text-2xl md:text-[28px] font-bold text-[#E7A439] text-center w-full block mb-8">
                                ثبت نام در سایت
                            </h1>

                            <!-- Form Content -->
                            <div class="space-y-5">
                                <!-- Input 1: Full name -->
                                <div class="flex flex-col space-y-1.5">
                                    <label class="text-[#555555] text-sm font-medium mr-1" for="reg-name">نام و نام خانوادگی</label>
                                    <input 
                                        type="text" 
                                        id="reg-name" 
                                        placeholder="هدیه" 
                                        required
                                        class="w-full max-w-[479px] h-[48px] px-4 rounded-[8px] border border-gray-200 bg-white text-gray-800 outline-none transition-all focus:border-[#E7A439] focus:ring-2 focus:ring-[#E7A439]/20"
                                    >
                                </div>

                                <!-- Input 2: Phone Number -->
                                <div class="flex flex-col space-y-1.5">
                                    <label class="text-[#555555] text-sm font-medium mr-1" for="reg-phone">شماره تماس</label>
                                    <input 
                                        type="tel" 
                                        id="reg-phone" 
                                        placeholder="۰۹۱۲۳۴۵۶۷۸۹" 
                                        required
                                        class="w-full max-w-[479px] h-[48px] px-4 rounded-[8px] border border-gray-200 bg-white text-gray-800 outline-none transition-all focus:border-[#E7A439] focus:ring-2 focus:ring-[#E7A439]/20 tracking-wider text-left"
                                    >
                                </div>

                                <!-- Remember Me Checkbox -->
                                <div class="flex items-center pt-1 pb-2">
                                    <label class="relative flex items-center cursor-pointer">
                                        <input type="checkbox" id="reg-remember" class="sr-only peer">
                                        <div class="w-5 h-5 bg-white border border-gray-300 rounded peer-checked:bg-[#E7A439] peer-checked:border-[#E7A439] transition-all flex items-center justify-center">
                                            <i data-lucide="check" class="text-[#FDF6EB] w-3.5 h-3.5 opacity-0 peer-checked:opacity-100 transition-opacity"></i>
                                        </div>
                                        <span class="mr-2 text-sm text-[#666666] select-none">مرا به خاطر بسپار</span>
                                    </label>
                                </div>

                                <!-- Buttons Stack -->
                                <div class="flex flex-col space-y-3 max-w-[479px]">
                                    <!-- Button 1: Proceed with verification code -->
                                    <button 
                                        type="button" 
                                        onclick="goToRegisterStep2()"
                                        class="w-full h-[44px] bg-[#E7A439] hover:bg-[#cf902f] text-[#FDF6EB] font-medium text-base rounded-[2px] shadow-md transition-all duration-300 flex items-center justify-center space-x-2 space-x-reverse"
                                    >
                                        <i data-lucide="arrow-left" class="w-5 h-5"></i>
                                        <span>ثبت نام با کد تایید</span>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Back to login footer -->
                        <div class="mt-8 pt-4 border-t border-gray-100 max-w-[479px] text-center">
                            <button onclick="toggleForms('login')" class="text-sm text-[#E7A439] hover:text-[#cf902f] font-semibold transition-all">
                                بازگشت به ورود
                            </button>
                        </div>
                    </div>

                    <!-- STEP 2: Phone Verification (تأیید تلفن) -->
                    <div id="signupStep2" class="hidden transition-all duration-300 transform translate-x-12 opacity-0 flex flex-col justify-center space-y-5">
                        <div>
                            <!-- Centered Title, Primary Color, No Border -->
                            <h1 class="text-2xl md:text-[28px] font-bold text-[#E7A439] text-center w-full block mb-8">
                                تأیید تلفن
                            </h1>

                            <!-- Active verification feedback -->
                            <div class="mb-6 p-4 bg-[#E7A439]/5 rounded-[8px] max-w-[479px] border border-[#E7A439]/20 flex items-start space-x-3 space-x-reverse">
                                <i data-lucide="smartphone" class="text-[#E7A439] w-5 h-5 mt-0.5"></i>
                                <div>
                                    <p class="text-sm text-[#555555] leading-relaxed">کد تایید یکبار مصرف به شماره زیر ارسال شد:</p>
                                    <p id="targetPhoneDisplay" class="text-base font-bold text-[#E7A439] mt-1 tracking-wider text-left"></p>
                                </div>
                            </div>

                            <!-- Form Content Step 2 -->
                            <form id="otpSubmitForm" class="space-y-4" onsubmit="handleVerificationSubmit(event)">
                                <!-- Input: Verification Code with Placeholder "رمز عبور پیامکی" -->
                                <div class="flex flex-col space-y-1.5">
                                    <label class="text-[#555555] text-sm font-medium mr-1" for="reg-otp">رمز عبور پیامکی</label>
                                    <input 
                                        type="text" 
                                        id="reg-otp" 
                                        placeholder="رمز عبور پیامکی" 
                                        required
                                        class="w-full max-w-[479px] h-[48px] px-4 rounded-[8px] border border-gray-200 bg-white text-gray-800 outline-none transition-all focus:border-[#E7A439] focus:ring-2 focus:ring-[#E7A439]/20 text-center tracking-widest font-semibold"
                                    >
                                </div>

                                <!-- Modern Countdown Timer Display & Resend Button -->
                                <div class="flex items-center justify-between max-w-[479px] px-1 py-2 text-sm">
                                    <div class="text-[#555555] flex items-center">
                                        <i data-lucide="timer" class="w-4 h-4 ml-1.5 text-gray-400"></i>
                                        <span>زمان باقی‌مانده:</span>
                                        <span id="countdown-display" class="font-bold text-[#E7A439] mr-1.5 tracking-wider">02:00</span>
                                    </div>
                                    <button 
                                        type="button" 
                                        id="resend-code-btn"
                                        disabled
                                        onclick="resendOTPCode()"
                                        class="text-gray-400 font-semibold transition-all duration-300 flex items-center cursor-not-allowed hover:text-gray-500"
                                    >
                                        <i data-lucide="rotate-ccw" class="w-4 h-4 ml-1"></i>
                                        <span>ارسال مجدد کد</span>
                                    </button>
                                </div>

                                <!-- Buttons Stack Step 2 -->
                                <div class="flex flex-col space-y-3 max-w-[479px] pt-2">
                                    <!-- Button 1: Verify OTP code -->
                                    <button 
                                        type="submit"
                                        class="w-full h-[44px] bg-[#E7A439] hover:bg-[#cf902f] text-[#FDF6EB] font-medium text-base rounded-[2px] shadow-md transition-all duration-300 flex items-center justify-center space-x-2 space-x-reverse"
                                    >
                                        <i data-lucide="check" class="w-5 h-5"></i>
                                        <span>اعتبار سنجی</span>
                                    </button>

                                    <!-- Button 2: Go back to Step 1 and change phone -->
                                    <button 
                                        type="button" 
                                        onclick="goBackToRegisterStep1()"
                                        class="w-full h-[44px] border border-[#E7A439] hover:bg-[#E7A439]/5 text-[#E7A439] font-medium text-base rounded-[2px] transition-all duration-300 flex items-center justify-center"
                                    >
                                        اصلاح شماره تماس
                                    </button>
                                </div>
                            </form>
                        </div>

                        <!-- Footer -->
                        <div class="mt-8 pt-4 border-t border-gray-100 max-w-[479px] text-center">
                            <button onclick="toggleForms('login')" class="text-sm text-[#E7A439] hover:text-[#cf902f] font-semibold transition-all">
                                انصراف و بازگشت به ورود
                            </button>
                        </div>
                    </div>

                </div>

                <!-- FORM 2: LOGIN (ورود به سایت) -->
                <div id="loginForm" class="w-full max-w-[479px] hidden transition-all duration-500 transform translate-x-12 opacity-0 flex flex-col justify-center space-y-5">
                    <div>
                        <!-- Centered Title, Primary Color, No Border -->
                        <h1 class="text-2xl md:text-[28px] font-bold text-[#E7A439] text-center w-full block mb-10">
                            ورود به سایت
                        </h1>

                        <!-- Form Content -->
                        <form id="loginSubmitForm" class="space-y-5" onsubmit="handleFormSubmit(event, 'کد یکبار مصرف برای شماره همراه شما پیامک شد!')">
                            <!-- Input 1: Phone Number -->
                            <div class="flex flex-col space-y-2">
                                <label class="text-[#555555] text-sm font-medium mr-1" for="login-phone">شماره تماس</label>
                                <input 
                                    type="tel" 
                                    id="login-phone" 
                                    placeholder="۰۹۱۲۳۴۵۶۷۸۹" 
                                    required
                                    class="w-full max-w-[479px] h-[48px] px-4 rounded-[8px] border border-gray-200 bg-white text-gray-800 outline-none transition-all focus:border-[#E7A439] focus:ring-2 focus:ring-[#E7A439]/20 tracking-wider text-left"
                                >
                            </div>

                            <!-- Remember Me Checkbox -->
                            <div class="flex items-center pt-1 pb-2">
                                <label class="relative flex items-center cursor-pointer">
                                    <input type="checkbox" id="login-remember" class="sr-only peer">
                                    <div class="w-5 h-5 bg-white border border-gray-300 rounded peer-checked:bg-[#E7A439] peer-checked:border-[#E7A439] transition-all flex items-center justify-center">
                                        <i data-lucide="check" class="text-[#FDF6EB] w-3.5 h-3.5 opacity-0 peer-checked:opacity-100 transition-opacity"></i>
                                    </div>
                                    <span class="mr-2 text-sm text-[#666666] select-none">مرا به خاطر بسپار</span>
                                </label>
                            </div>

                            <!-- Buttons Stack -->
                            <div class="flex flex-col space-y-3 max-w-[479px]">
                                <!-- Button 1: One-time code login -->
                                <button 
                                    type="submit"
                                    class="w-full h-[44px] bg-[#E7A439] hover:bg-[#cf902f] text-[#FDF6EB] font-medium text-base rounded-[2px] shadow-md transition-all duration-300 flex items-center justify-center"
                                >
                                    ورود با کد یکبار مصرف
                                </button>

                                <!-- Button 2: Join site -->
                                <button 
                                    type="button" 
                                    onclick="toggleForms('signup')"
                                    class="w-full h-[44px] border border-[#E7A439] hover:bg-[#E7A439]/5 text-[#E7A439] font-medium text-base rounded-[2px] transition-all duration-300 flex items-center justify-center"
                                >
                                    عضویت در سایت
                                </button>
                            </div>
                        </form>
                    </div>

                    <!-- Spacer to keep symmetric height -->
                    <div class="mt-8 pt-4 border-t border-gray-100 max-w-[479px] text-center">
                        <span class="text-sm text-gray-400">پنل کاربری یکپارچه امنیت سیستم</span>
                    </div>
                </div>

            </div>

            <!-- LEFT SIDE: Full Image Area (Constant across transitions) -->
            <div class="w-full md:w-1/2 h-[250px] md:h-full relative overflow-hidden bg-[#E7A439]">
                <img 
                    src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=800&q=80" 
                    alt="تصویر پس‌زمینه" 
                    class="w-full h-full object-cover opacity-90 transition-transform duration-700 hover:scale-105"
                    onerror="this.src='data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100%' height='100%' viewBox='0 0 100 100'><rect width='100%' height='100%' fill='%23E7A439'/><text x='50%' y='50%' font-size='6' fill='%23fff' text-anchor='middle'>خوش آمدید</text></svg>'"
                >
                <!-- Overlay with abstract gradient for luxury touch -->
                <div class="absolute inset-0 bg-gradient-to-t from-[#e7a439]/80 via-transparent to-black/30 flex flex-col justify-end p-8 text-white">
                    <h2 class="text-2xl md:text-3xl font-bold mb-2">فضای کاری مدرن شما</h2>
                    <p class="text-sm md:text-base text-[#FDF6EB]/90 font-light leading-relaxed">با ما، کسب و کار و مهارت‌های خود را به سطح جدیدی از بهره‌وری و خلاقیت برسانید.</p>
                </div>
            </div>

        </div>

    </div>

    <!-- Beautiful Modern Toast Notification Box -->
    <div id="toast" class="fixed top-5 left-5 bg-emerald-600 text-white px-6 py-3.5 rounded-lg shadow-xl translate-y-[-100px] opacity-0 transition-all duration-500 ease-out z-[60] flex items-center space-x-3 space-x-reverse pointer-events-none">
        <div class="bg-white/20 p-1.5 rounded-full">
            <i data-lucide="check-circle" class="w-5 h-5 text-white"></i>
        </div>
        <span id="toastMessage" class="font-medium text-sm"></span>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // Modal Open/Close Logic with Transitions
        function openAuthModal() {
            const backdrop = document.getElementById('authModal');
            const container = backdrop.querySelector('.relative');
            
            // Show backdrop
            backdrop.classList.remove('opacity-0', 'pointer-events-none');
            backdrop.classList.add('opacity-100', 'pointer-events-auto');
            
            // Animate container scale and opacity
            setTimeout(() => {
                container.classList.remove('scale-95', 'opacity-0');
                container.classList.add('scale-100', 'opacity-100');
            }, 50);
        }

        function closeAuthModal() {
            const backdrop = document.getElementById('authModal');
            const container = backdrop.querySelector('.relative');
            
            // Hide container
            container.classList.remove('scale-100', 'opacity-100');
            container.classList.add('scale-95', 'opacity-0');
            
            // Hide backdrop after container animation finishes
            setTimeout(() => {
                backdrop.classList.remove('opacity-100', 'pointer-events-auto');
                backdrop.classList.add('opacity-0', 'pointer-events-none');
                
                // Optional: Reset form to initial state when closed
                resetModalForms();
            }, 400);
        }

        // Close modal when clicking outside the main container
        document.getElementById('authModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeAuthModal();
            }
        });

        function resetModalForms() {
            // Return to step 1 of signup or default view if needed
            toggleForms('signup');
            document.getElementById('reg-name').value = '';
            document.getElementById('reg-phone').value = '';
            document.getElementById('reg-otp').value = '';
            document.getElementById('login-phone').value = '';
        }

        // Timer State Variables
        let timerInterval = null;
        const initialSeconds = 120; // 2 Minutes
        let secondsLeft = initialSeconds;

        // Elegant Form Switching Logic with Slide/Fade Animation (Signup vs Login)
        function toggleForms(target) {
            const signup = document.getElementById('signupForm');
            const login = document.getElementById('loginForm');

            // Reset back to register step 1 when opening register form
            if (target === 'signup') {
                clearInterval(timerInterval); // Stop timer if switching back to register
                document.getElementById('signupStep2').classList.add('hidden', 'opacity-0', 'translate-x-12');
                document.getElementById('signupStep1').classList.remove('hidden', 'opacity-0', '-translate-x-12');
                document.getElementById('signupStep1').classList.add('opacity-100', 'translate-x-0');
            }

            if (target === 'login') {
                clearInterval(timerInterval); // Stop timer
                signup.classList.add('opacity-0', '-translate-x-12');
                signup.classList.remove('translate-x-0', 'opacity-100');
                
                setTimeout(() => {
                    signup.classList.add('hidden');
                    login.classList.remove('hidden');
                    login.offsetHeight; // Force reflow
                    login.classList.remove('opacity-0', 'translate-x-12');
                    login.classList.add('opacity-100', 'translate-x-0');
                }, 400);
            } else {
                login.classList.add('opacity-0', 'translate-x-12');
                login.classList.remove('translate-x-0', 'opacity-100');
                
                setTimeout(() => {
                    login.classList.add('hidden');
                    signup.classList.remove('hidden');
                    signup.offsetHeight; // Force reflow
                    signup.classList.remove('opacity-0', '-translate-x-12');
                    signup.classList.add('opacity-100', 'translate-x-0');
                }, 400);
            }
        }

        // 2-Step Registration Navigation
        function goToRegisterStep2() {
            const name = document.getElementById('reg-name').value.trim();
            const phone = document.getElementById('reg-phone').value.trim();

            if (!name || !phone) {
                showToast('لطفاً ابتدا تمامی مشخصات مرحله اول را تکمیل نمایید.');
                return;
            }

            const phonePattern = /^09\d{9}$/;
            if (!phonePattern.test(phone)) {
                showToast('لطفاً یک شماره موبایل معتبر وارد نمایید (مانند ۰۹۱۲۳۴۵۶۷۸۹).');
                return;
            }

            document.getElementById('targetPhoneDisplay').textContent = phone;

            const step1 = document.getElementById('signupStep1');
            const step2 = document.getElementById('signupStep2');

            step1.classList.add('opacity-0', '-translate-x-12');
            step1.classList.remove('translate-x-0', 'opacity-100');

            setTimeout(() => {
                step1.classList.add('hidden');
                step2.classList.remove('hidden');
                step2.offsetHeight; // Force reflow
                step2.classList.remove('opacity-0', 'translate-x-12');
                step2.classList.add('opacity-100', 'translate-x-0');
                
                startOTPTimer();
                showToast('کد تایید شبیه‌سازی شده به شماره همراه شما ارسال شد!');
            }, 300);
        }

        // Function to start the OTP Countdown Timer
        function startOTPTimer() {
            clearInterval(timerInterval);
            secondsLeft = initialSeconds;
            
            const timerDisplay = document.getElementById('countdown-display');
            const resendBtn = document.getElementById('resend-code-btn');

            resendBtn.disabled = true;
            resendBtn.classList.add('text-gray-400', 'cursor-not-allowed');
            resendBtn.classList.remove('text-[#E7A439]', 'hover:text-[#cf902f]', 'cursor-pointer');

            function updateTimer() {
                const minutes = Math.floor(secondsLeft / 60);
                const seconds = secondsLeft % 60;
                
                const minStr = String(minutes).padStart(2, '0');
                const secStr = String(seconds).padStart(2, '0');
                
                timerDisplay.textContent = `${minStr}:${secStr}`;

                if (secondsLeft <= 0) {
                    clearInterval(timerInterval);
                    resendBtn.disabled = false;
                    resendBtn.classList.remove('text-gray-400', 'cursor-not-allowed');
                    resendBtn.classList.add('text-[#E7A439]', 'hover:text-[#cf902f]', 'cursor-pointer');
                    showToast('شما هم اکنون می‌توانید کد تایید را دوباره درخواست کنید.');
                } else {
                    secondsLeft--;
                }
            }

            updateTimer();
            timerInterval = setInterval(updateTimer, 1000);
        }

        function resendOTPCode() {
            showToast('کد تایید جدید مجدداً ارسال گردید.');
            document.getElementById('reg-otp').value = '';
            startOTPTimer();
        }

        function goBackToRegisterStep1() {
            clearInterval(timerInterval);

            const step1 = document.getElementById('signupStep1');
            const step2 = document.getElementById('signupStep2');

            step2.classList.add('opacity-0', 'translate-x-12');
            step2.classList.remove('translate-x-0', 'opacity-100');

            setTimeout(() => {
                step2.classList.add('hidden');
                step1.classList.remove('hidden');
                step1.offsetHeight; // Force reflow
                step1.classList.remove('opacity-0', '-translate-x-12');
                step1.classList.add('opacity-100', 'translate-x-0');
            }, 300);
        }

        function handleVerificationSubmit(event) {
            event.preventDefault();
            const otpCode = document.getElementById('reg-otp').value.trim();

            if (!otpCode) {
                showToast('لطفاً رمز عبور پیامکی ارسالی را وارد نمایید.');
                return;
            }

            showToast('اعتبارسنجی با موفقیت انجام شد! ثبت‌نام تکمیل گردید.');
            clearInterval(timerInterval);
            
            setTimeout(() => {
                closeAuthModal();
            }, 1000);
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            
            toastMessage.textContent = message;
            toast.classList.remove('translate-y-[-100px]', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');

            setTimeout(() => {
                toast.classList.add('translate-y-[-100px]', 'opacity-0');
                toast.classList.remove('translate-y-0', 'opacity-100');
            }, 3500);
        }

        function handleFormSubmit(event, message) {
            event.preventDefault();
            showToast(message);
            event.target.reset();
        }
    </script>
</body>
